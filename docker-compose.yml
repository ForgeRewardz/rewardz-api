version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rewardz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rewardz
      SOLANA_RPC_URL: https://api.devnet.solana.com
      JWT_SECRET: docker-dev-secret
      INTERNAL_API_KEY: docker-dev-key
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
